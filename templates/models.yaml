# models.yaml — Single source of truth for all model configuration.
# The orchestrator reads this file. Aider gets model names from here.
# To add a new provider (e.g., Google AI Studio), add models to the appropriate tier.

tiers:
  - name: primary
    models:
      - groq/qwen/qwen3-32b
      - groq/moonshotai/kimi-k2-instruct
      - groq/meta-llama/llama-4-scout-17b-16e-instruct
    retries: 3

  - name: escalation
    models:
      - groq/openai/gpt-oss-120b
    retries: 2

  # Gemini tier: tried after escalation, before flagging for Claude review.
  # Requires GOOGLE_API_KEY=<your-key> in .env (never committed).
  # GEMINI_API_KEY is still accepted as a legacy alias and mirrored automatically.
  # Aider/LiteLLM picks the key up automatically via the gemini/ provider prefix.
  # Daily quota exhaustion causes immediate model-skip (no sleep), then falls
  # through to Claude review if both models are exhausted for the day.
  - name: gemini
    models:
      - gemini/gemini-3-flash-preview  # Gemini 3 Flash (primary)
      - gemini/gemini-2.5-flash        # Gemini 2.5 Flash fallback
    retries: 1                         # One attempt per model; daily quota errors skip, not retry

# Weak model for commit messages and safe operations (low token cost)
weak_model: groq/llama-3.1-8b-instant

# Spec size warning thresholds. The orchestrator no longer compresses or
# truncates spec text — the spec is attached to Aider as a read-only file
# instead — but oversized specs still warn during validation so authors
# get a chance to split them before hitting the model's effective context
# window.
spec_limits:
  soft_limit_chars: 12000   # validation warning above this
  hard_limit_chars: 16000   # validation warning + likely TPM trouble above this

# Read-only context budget for aider. Spec + test are always attached; dependency
# target files are attached until these limits are reached.
context_limits:
  max_read_files: 4
  max_dependency_files: 2
  max_total_bytes: 24000

# Seconds to pause between tasks as a defensive baseline.
#
# The orchestrator also keeps a per-model rate-limit coordinator: when any
# task receives a Groq 429 with a "try again in Ns" hint, that exact wait
# is recorded and honoured before the next request to that model, across
# tasks and retries. So in practice the coordinator handles the precise
# case and cooldown_seconds is a fallback for signals the parser misses.
#
# You can lower this if your tasks are short and the coordinator is
# catching most rate limits; raise it if you are still seeing 429s at the
# start of each task.
cooldown_seconds: 30

# Maximum seconds to wait for a single aider invocation before timing out.
# Increase for large escalation models on long specs (they can easily take
# >5 min). Setting this too low causes silent task failures that look like
# aider producing no output.
aider_timeout_seconds: 300
